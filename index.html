<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyawit Payment UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <div class="card">

      <div class="left">
        <div class="mockup">
          <img src="images/WhatsApp Image 2026-03-03 at 20.27.04.jpeg" alt="Icon Nyawit Preview">
        </div>
      </div>

      <div class="right">
        <h2>Detail Panen</h2>

        <label> Nama Petani</label>
        <input type="text" placeholder="DONI">

        <label>Jenis Bibit</label>
        <input type="text" placeholder="SAWIT">

        <label>Luas Lahan</label>
        <input type="text" placeholder="100 HEKTAR">

        <label>Tanggal Panen</label>
        <input type="date">

        <p class="total">Total Tonase: <span>XXXXXXXXXXX</span></p>

        <button>Panen Sekarang</button>
      </div>

    </div>
  </div>
</body>
</html>
